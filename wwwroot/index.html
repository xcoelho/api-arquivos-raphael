<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Arquivos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <h1>
        <span>📁</span>
        Gerenciador de Arquivos
    </h1>
    <div class="header-actions">
        <button class="btn btn-primary" onclick="createFolderAction()">
            <span>➕</span> Nova Pasta
        </button>
    </div>
</header>

<main>
    <aside class="sidebar">
        <div class="sidebar-header">
            <span>Pastas</span>
            <span class="loading-spinner" id="folder-list-loading" style="display:none"></span>
        </div>
        <div class="folder-list" id="folder-list"></div>
    </aside>

    <section class="content-area">
        <div class="empty-state" id="empty-state">
            <div class="icon">📂</div>
            <div class="text">Selecione uma pasta</div>
            <div class="subtext">Clique em uma pasta ao lado para ver seus arquivos</div>
        </div>

        <div class="file-list" id="file-list">
            <div class="file-list-header">
                <h2 id="folder-name-title"></h2>
                <div class="folder-actions">
                    <button class="btn" onclick="createFileAction()">
                        <span>➕</span> Novo Arquivo
                    </button>
                    <button class="btn btn-danger" onclick="deleteFolderAction()">
                        <span>🗑</span> Apagar Pasta
                    </button>
                </div>
            </div>

            <div style="text-align:center;padding:40px;color:var(--text-muted);display:none" id="file-grid-loading">
                <div class="loading-spinner" style="width:24px;height:24px;border-width:3px;margin:0 auto 12px"></div>
                <div style="font-size:13px">Carregando arquivos...</div>
            </div>

            <div class="file-grid" id="file-grid"></div>
            <div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;display:none" id="file-grid-empty">
                Nenhum arquivo nesta pasta
            </div>
        </div>

        <div class="editor-panel" id="editor-panel">
            <div class="editor-toolbar">
                <span class="file-label" id="editor-filename"></span>
                <div class="editor-actions">
                    <button class="btn btn-primary" onclick="saveContentAction()">
                        <span>💾</span> Salvar
                    </button>
                    <button class="btn btn-danger" onclick="deleteFileAction()">
                        <span>🗑</span> Apagar
                    </button>
                </div>
            </div>
            <div class="editor-body">
                <textarea id="editor-textarea" placeholder="Selecione um arquivo para editar..." spellcheck="false"></textarea>
            </div>
        </div>
    </section>
</main>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal"></div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/js/app.js"></script>
</body>
</html>
